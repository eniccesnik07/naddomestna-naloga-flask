<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vremenski dnevnik{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav>
    <div class="nav-brand">🌤️ Vremenski dnevnik</div>
    <div class="nav-links">
      <form method="post" action="{{ url_for('clear_history') }}"
            onsubmit="return confirm('Izbriši zgodovino iskanj?')">
        <button type="submit" class="btn btn-outline btn-sm">🗑️ Počisti zgodovino</button>
      </form>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
