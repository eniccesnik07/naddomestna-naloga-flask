<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SocialApp{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav>
    <div class="nav-brand">🌐 SocialApp</div>
    {% if session.user_id %}
    <div class="nav-links">
      <a href="{{ url_for('profile', username=session.username) }}" class="nav-user">
        👤 {{ session.username }}
      </a>
      <a href="{{ url_for('feed') }}" class="btn btn-outline btn-sm">Domov</a>
      <a href="{{ url_for('logout') }}" class="btn btn-outline btn-sm">Odjava</a>
    </div>
    {% endif %}
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
